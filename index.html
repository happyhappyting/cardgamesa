<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wah! SA 全向镜像竞技版</title>
    <style>
        :root { --orange: #f97316; --purple: #8b5cf6; --bg: #0f172a; }
        body { margin: 0; background: var(--bg); font-family: sans-serif; overflow: hidden; height: 100vh; color: white; }
        
        /* 启动界面 */
        #setup-screen { position: fixed; inset: 0; background: #1e293b; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .setup-box { background: white; color: #333; padding: 25px; border-radius: 20px; width: 300px; text-align: center; }
        .mode-btn { padding: 10px; border: 2px solid #ddd; border-radius: 10px; cursor: pointer; flex: 1; margin: 5px; }
        .mode-btn.active { border-color: var(--orange); color: var(--orange); }

        /* 游戏主舞台 */
        #game-board { position: relative; width: 100vw; height: 100vh; display: grid; 
            grid-template-areas: "p0-corner top p1-corner" "left center right" "p2-corner bottom p3-corner"; 
            grid-template-columns: 120px 1fr 120px; grid-template-rows: 120px 1fr 120px; }

        /* 中央镜像区：四组牌分别朝向四方 */
        .center-area { grid-area: center; position: relative; display: flex; align-items: center; justify-content: center; }
        .mirror-group { position: absolute; display: flex; gap: 8px; transition: 0.3s; padding: 10px; border-radius: 10px; }
        /* 四个方向的克隆牌堆 */
        .mirror-top { transform: rotate(180deg) translateY(80px); }
        .mirror-bottom { transform: translateY(80px); }
        .mirror-left { transform: rotate(90deg) translateY(80px); }
        .mirror-right { transform: rotate(-90deg) translateY(80px); }

        /* 玩家手牌区 */
        .player-zone { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; align-content: center; padding: 10px; border: 4px solid transparent; border-radius: 20px; transition: 0.3s; }
        .zone-0 { grid-area: top; transform: rotate(180deg); }
        .zone-1 { grid-area: left; transform: rotate(90deg); }
        .zone-2 { grid-area: right; transform: rotate(-90deg); }
        .zone-3 { grid-area: bottom; }
        
        /* 轮到谁的视觉提示 */
        .active-turn { border-color: var(--orange); background: rgba(249, 115, 22, 0.1); box-shadow: 0 0 20px rgba(249, 115, 22, 0.4); }

        .card { width: 50px; height: 75px; background: white; color: #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; box-shadow: 0 3px 6px rgba(0,0,0,0.3); border: 3px solid transparent; cursor: pointer; }
        .card.target { width: 60px; height: 85px; font-size: 28px; }
        .card.selected { border-color: #ef4444; transform: scale(1.1); }
        .card.special { background: var(--purple); color: white; font-size: 12px; }

        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fbbf24; font-weight: bold; font-size: 20px; text-shadow: 0 0 10px black; pointer-events: none; text-align: center; z-index: 100; }
        .name-tag { position: absolute; bottom: -20px; font-size: 12px; opacity: 0.7; width: 100px; text-align: center; }

        /* 结算和弹窗保持一致... */
        #special-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 500; }
        .target-btn { padding: 15px 30px; margin: 10px; border-radius: 10px; border: none; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-box">
            <h2 style="color:var(--orange)">Wah! SA 镜像平衡版</h2>
            <div style="display:flex;">
                <div class="mode-btn" id="m2" onclick="setCount(2)">2人(上下)</div>
                <div class="mode-btn" id="m3" onclick="setCount(3)">3人(三边)</div>
                <div class="mode-btn active" id="m4" onclick="setCount(4)">4人(全围)</div>
            </div>
            <div id="inputs"></div>
            <button class="btn-start" style="width:100%; padding:15px; background:var(--orange); border:none; color:white; border-radius:10px; margin-top:10px;" onclick="initGame()">开始游戏</button>
        </div>
    </div>

    <div id="game-board">
        <div id="zone-0" class="player-zone zone-0"></div>
        <div id="zone-1" class="player-zone zone-1"></div>
        <div id="zone-2" class="player-zone zone-2"></div>
        <div id="zone-3" class="player-zone zone-3"></div>

        <div class="center-area">
            <div id="msg"></div>
            <div class="mirror-group mirror-top" id="mirror-0"></div>
            <div class="mirror-group mirror-left" id="mirror-1"></div>
            <div class="mirror-group mirror-right" id="mirror-2"></div>
            <div class="mirror-group mirror-bottom" id="mirror-3"></div>
        </div>
    </div>

    <div id="special-overlay">
        <div id="btn-wrap" style="display:flex; flex-direction:column;"></div>
    </div>

<script>
    let config = { count: 4, players: [], deck: [], targets: [], turn: 0, activeWords: [] };
    let sel = { hIdx: null, tIdx: null, type: null };
    const WORD_LIB = ["坚持不懈", "开卷有益", "以礼待人", "新颖", "戏剧", "工作坊", "尴尬", "维护", "友谊", "一帆顺"];
    const SPECIALS = ["万能", "小偷", "换手", "+2", "禁止"];

    function setCount(n) {
        config.count = n;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('m'+n).classList.add('active');
        const inp = document.getElementById('inputs');
        inp.innerHTML = '';
        for(let i=0; i<n; i++) inp.innerHTML += `<input type="text" id="in-${i}" value="学生${i+1}" style="width:80%; margin:5px; padding:8px; text-align:center; border-radius:5px; border:1px solid #ccc;">`;
    }
    setCount(4);

    function initGame() {
        config.activeWords = [...WORD_LIB].sort(() => 0.5 - Math.random()).slice(0, 10);
        let chars = config.activeWords.join('').split('');
        SPECIALS.forEach(s => chars.push(s, s));
        config.deck = chars.sort(() => 0.5 - Math.random());
        
        let seats = config.count === 2 ? [0, 3] : (config.count === 3 ? [0, 1, 3] : [0, 1, 2, 3]);
        config.players = seats.map((sIdx, i) => ({
            seatIdx: sIdx,
            name: document.getElementById('in-'+i).value,
            hand: config.deck.splice(0, 6),
            score: 0
        }));
        config.targets = config.deck.splice(0, 3);
        config.turn = 0;
        document.getElementById('setup-screen').style.display = 'none';
        render();
    }

    function render() {
        // 1. 清空所有区域
        for(let i=0; i<4; i++) {
            document.getElementById('zone-'+i).innerHTML = '';
            document.getElementById('zone-'+i).classList.remove('active-turn');
            document.getElementById('mirror-'+i).innerHTML = '';
        }

        // 2. 渲染手牌
        config.players.forEach((p, i) => {
            const zone = document.getElementById('zone-'+p.seatIdx);
            if(i === config.turn) zone.classList.add('active-turn');
            zone.innerHTML += `<div class="name-tag">${p.name}</div>`;
            p.hand.forEach((card, hIdx) => {
                let d = document.createElement('div');
                d.className = `card ${SPECIALS.includes(card)?'special':''} ${i===config.turn && sel.hIdx===hIdx?'selected':''}`;
                d.innerText = card;
                d.onclick = () => { if(i === config.turn) onHandClick(hIdx); };
                zone.appendChild(d);
            });
        });

        // 3. 渲染四组镜像目标牌
        for(let side=0; side<4; side++) {
            const mirror = document.getElementById('mirror-'+side);
            config.targets.forEach((tar, tIdx) => {
                let d = document.createElement('div');
                d.className = `card target ${sel.tIdx===tIdx?'selected':''}`;
                d.innerText = tar;
                d.onclick = () => { onTargetClick(tIdx); };
                mirror.appendChild(d);
            });
        }
        document.getElementById('msg').innerText = `轮到: ${config.players[config.turn].name}`;
    }

    function onHandClick(hIdx) {
        const p = config.players[config.turn];
        const card = p.hand[hIdx];
        sel.hIdx = hIdx;
        sel.type = card;
        if(SPECIALS.includes(card) && card !== "万能") showSpecialMenu(card);
        render();
    }

    function onTargetClick(tIdx) {
        if(sel.hIdx === null) return;
        sel.tIdx = tIdx;
        const h = config.players[config.turn].hand[sel.hIdx];
        const t = config.targets[tIdx];
        const isMatch = (h === "万能") || config.activeWords.some(w => w.includes(h) && w.includes(t) && h !== t);
        
        if(isMatch) {
            config.players[config.turn].hand.splice(sel.hIdx, 1);
            config.targets[tIdx] = config.deck.shift() || "完";
            nextTurn();
        } else {
            alert("配对失败！");
            sel = {hIdx: null, tIdx: null, type: null};
        }
        render();
    }

    function showSpecialMenu(type) {
        const over = document.getElementById('special-overlay');
        const wrap = document.getElementById('btn-wrap');
        wrap.innerHTML = `<h3 style="color:white; text-align:center">使用 ${type}</h3>`;
        config.players.forEach((p, i) => {
            if(i !== config.turn) {
                let b = document.createElement('button');
                b.className = 'target-btn';
                b.innerText = p.name;
                b.onclick = () => applySpecial(i, type);
                wrap.appendChild(b);
            }
        });
        over.style.display = 'flex';
    }

    function applySpecial(toIdx, type) {
        const fromP = config.players[config.turn];
        const toP = config.players[toIdx];
        if(type === "小偷") fromP.hand.push(toP.hand.pop());
        if(type === "+2") toP.hand.push(...config.deck.splice(0,2));
        if(type === "换手") { let tmp = [...fromP.hand]; tmp.splice(sel.hIdx,1); fromP.hand = [...toP.hand]; toP.hand = tmp; }
        if(type !== "换手") fromP.hand.splice(sel.hIdx, 1);
        
        document.getElementById('special-overlay').style.display = 'none';
        nextTurn();
        render();
    }

    function nextTurn() {
        if(config.players[config.turn].hand.length === 0) alert(config.players[config.turn].name + " 赢了！");
        config.turn = (config.turn + 1) % config.count;
        sel = {hIdx: null, tIdx: null, type: null};
    }
</script>
</body>
</html>
