<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wah! SA 围炉竞技</title>
    <style>
        :root { --orange: #f97316; --slate: #1e293b; }
        body { margin: 0; background: #0f172a; font-family: sans-serif; overflow: hidden; height: 100vh; color: white; }
        
        #setup-screen { position: fixed; inset: 0; background: var(--slate); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .setup-box { background: white; color: #333; padding: 25px; border-radius: 20px; width: 300px; text-align: center; }
        input { padding: 10px; width: 80%; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; text-align: center; }
        .btn-start { background: var(--orange); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 15px; }

        /* 游戏布局 */
        #game-board { position: relative; width: 100vw; height: 100vh; display: grid; grid-template-areas: ". top ." "left center right" ". bottom ."; grid-template-columns: 200px 1fr 200px; grid-template-rows: 200px 1fr 200px; }
        .center-area { grid-area: center; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid rgba(255,255,255,0.1); border-radius: 30px; margin: 10px; background: rgba(255,255,255,0.05); }
        .player-zone { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; align-content: center; padding: 10px; }
        .zone-0 { grid-area: top; transform: rotate(180deg); }
        .zone-1 { grid-area: left; transform: rotate(90deg); }
        .zone-2 { grid-area: right; transform: rotate(-90deg); }
        .zone-3 { grid-area: bottom; }
        
        .card { width: 50px; height: 75px; background: white; border-radius: 6px; color: #333; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.5); }
        .card.special { background: #8b5cf6; color: white; font-size: 13px; }
        .card.target { width: 75px; height: 105px; font-size: 38px; }
        
        /* 弹窗 */
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
        .name-label { position: absolute; font-size: 12px; color: #fbbf24; font-weight: bold; bottom: 2px; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-box">
            <h3>输入玩家姓名</h3>
            <div id="name-inputs">
                <input type="text" id="p0" value="玩家1" placeholder="玩家1">
                <input type="text" id="p1" value="玩家2" placeholder="玩家2">
                <input type="text" id="p2" value="玩家3" placeholder="玩家3">
                <input type="text" id="p3" value="玩家4" placeholder="玩家4">
            </div>
            <button class="btn-start" onclick="startGame()">开始比赛 🚀</button>
        </div>
    </div>

    <div id="game-board">
        <div id="zone-0" class="player-zone zone-0"></div>
        <div id="zone-1" class="player-zone zone-1"></div>
        <div id="zone-2" class="player-zone zone-2"></div>
        <div id="zone-3" class="player-zone zone-3"></div>
        <div class="center-area">
            <div id="msg" style="color:#fbbf24; font-weight:bold; margin-bottom:10px;">开始！</div>
            <div id="targets" style="display:flex; gap:10px;"></div>
        </div>
    </div>

    <div id="overlay">
        <div id="overlay-title" style="margin-bottom:20px; font-weight:bold;">对谁使用？</div>
        <div id="btns" style="width:80%; display:grid; gap:10px;"></div>
    </div>

<script>
    let players = [];
    let targets = [];
    let deck = [];
    let words = ["坚持不懈", "开卷有益", "以礼待人", "新颖", "戏剧", "工作坊", "尴尬", "维护", "友谊", "一帆顺"];
    let specials = ["万能", "小偷", "换手", "+2", "禁止"];
    let sel = { pid: null, hIdx: null };

    function startGame() {
        players = [];
        for(let i=0; i<4; i++) {
            players.push({ name: document.getElementById('p'+i).value, hand: [] });
        }
        let chars = words.join('').split('');
        specials.forEach(s => chars.push(s, s));
        deck = chars.sort(() => 0.5 - Math.random());
        players.forEach(p => p.hand = deck.splice(0, 6));
        targets = deck.splice(0, 3);
        document.getElementById('setup-screen').style.display = 'none';
        render();
    }

    function render() {
        for(let i=0; i<4; i++) {
            const z = document.getElementById('zone-'+i);
            z.innerHTML = `<div class="name-label">${players[i].name}</div>`;
            players[i].hand.forEach((c, idx) => {
                let div = document.createElement('div');
                div.className = 'card ' + (specials.includes(c) ? 'special' : '');
                div.innerText = c;
                div.onclick = () => {
                    sel = {pid: i, hIdx: idx};
                    if(specials.includes(c) && c !== "万能") showMenu(i, c);
                    else if(c === "万能") document.getElementById('msg').innerText = "选一个目标字";
                };
                z.appendChild(div);
            });
        }
        const t = document.getElementById('targets');
        t.innerHTML = '';
        targets.forEach((tar, idx) => {
            let div = document.createElement('div');
            div.className = 'card target';
            div.innerText = tar;
            div.onclick = () => {
                if(sel.pid !== null) {
                    let h = players[sel.pid].hand[sel.hIdx];
                    if(h === "万能" || words.some(w => w.includes(h) && w.includes(tar))) {
                        players[sel.pid].hand.splice(sel.hIdx, 1);
                        targets[idx] = deck.shift() || "";
                        document.getElementById('msg').innerText = players[sel.pid].name + " 配对成功！";
                        render();
                    }
                }
            };
            t.appendChild(div);
        });
    }

    function showMenu(pid, type) {
        document.getElementById('overlay').style.display = 'flex';
        const btns = document.getElementById('btns');
        btns.innerHTML = '';
        players.forEach((p, i) => {
            if(i !== pid) {
                let b = document.createElement('button');
                b.style.padding = '15px'; b.innerText = p.name;
                b.onclick = () => {
                    // 功能牌效果
                    if(type === "小偷") players[pid].hand.push(players[i].hand.pop());
                    if(type === "换手") { let t = players[pid].hand; players[pid].hand = players[i].hand; players[i].hand = t; }
                    players[pid].hand.splice(sel.hIdx, 1);
                    document.getElementById('overlay').style.display = 'none';
                    render();
                };
                btns.appendChild(b);
            }
        });
    }
</script>
</body>
</html>
