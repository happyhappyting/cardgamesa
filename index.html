<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wah! SA 你配不配</title>
    <script src="https://cdn.staticfile.org/vue/3.3.4/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.staticfile.org/canvas-confetti/1.6.0/confetti.browser.min.js"></script>
    <style>
        /* 使用系统自带备用字体，防止加载延迟 */
        body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background-color: #f0f4f8; }
        .card { transition: all 0.2s; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .card-selected { border: 5px solid #ef4444 !important; transform: translateY(-10px); z-index: 10; }
        .special-card { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; }
        [v-cloak] { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="fixed inset-0 overflow-hidden">

<div id="app" v-cloak class="h-full flex flex-col">
    
    <div v-if="gameState === 'setup'" class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full border-b-8 border-orange-500 text-center">
            <h1 class="text-4xl font-bold text-orange-600 mb-8">Wah! SA 你配不配</h1>
            
            <div class="mb-6">
                <label class="block font-bold text-gray-700 mb-2">玩家人数 (2-6人):</label>
                <div class="flex items-center justify-between bg-gray-100 p-2 rounded-2xl">
                    <button @click="if(playerCount > 2) playerCount--" class="w-12 h-12 bg-white rounded-xl shadow text-2xl font-bold">-</button>
                    <span class="text-3xl font-bold text-orange-600">{{ playerCount }}</span>
                    <button @click="if(playerCount < 6) playerCount++" class="w-12 h-12 bg-white rounded-xl shadow text-2xl font-bold">+</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2 mb-8 max-h-40 overflow-y-auto">
                <input v-for="n in playerCount" :key="n" v-model="playerNames[n-1]" :placeholder="'玩家 ' + n" 
                       class="p-2 bg-gray-50 border border-gray-200 rounded-lg text-center text-sm outline-none focus:border-orange-500">
            </div>

            <button @click="startGame" class="w-full bg-orange-500 text-white text-2xl font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">
                开始游戏
            </button>
        </div>
    </div>

    <div v-if="gameState === 'playing'" class="flex-1 flex flex-col p-4">
        <div class="flex justify-between items-center mb-4 bg-white p-3 rounded-xl shadow-sm border border-gray-200">
            <div class="font-bold text-lg">轮到：<span class="text-orange-600">{{ currentPlayer.name }}</span></div>
            <div class="text-gray-400 font-bold">牌堆: {{ deck.length }}</div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center gap-6">
            <div class="flex gap-3">
                <div v-for="(target, index) in targetCards" :key="index" 
                     @click="selectTarget(index)"
                     class="card w-24 h-36 md:w-32 md:h-48 bg-white rounded-xl shadow-lg flex items-center justify-center text-5xl font-bold border-4"
                     :class="selectedTargetIndex === index ? 'border-red-500 bg-red-50' : 'border-gray-200'">
                    {{ target }}
                </div>
                <div @click="drawCard" class="card w-20 h-36 md:w-24 md:h-48 bg-gray-800 rounded-xl shadow-lg flex flex-col items-center justify-center text-white">
                    <span class="text-2xl mb-2">🃏</span>
                    <span class="text-xs">摸牌</span>
                </div>
            </div>
            <div class="h-8 text-orange-600 font-bold text-lg">{{ feedback }}</div>
        </div>

        <div class="bg-gray-200/50 p-4 rounded-t-3xl border-t-2 border-orange-200">
            <div class="flex overflow-x-auto gap-3 pb-4 no-scrollbar">
                <div v-for="(card, index) in currentPlayer.hand" :key="index"
                     @click="selectHand(index)"
                     class="card min-w-[70px] h-28 md:min-w-[90px] md:h-36 rounded-xl shadow-md flex items-center justify-center text-4xl font-bold border-2"
                     :class="[selectedHandIndex === index ? 'card-selected' : '', isSpecial(card) ? 'special-card' : 'bg-white border-white text-gray-800']">
                    {{ card }}
                </div>
            </div>
            <div class="text-center text-xs text-gray-500 font-bold">请点击一张手牌再点目标牌</div>
        </div>
    </div>

    <div v-if="gameState === 'ended'" class="flex-1 flex items-center justify-center bg-orange-500 p-4">
        <div class="bg-white p-10 rounded-[2rem] text-center w-full max-w-sm">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-2xl font-bold mb-2">获胜者</h2>
            <div class="text-5xl font-bold text-orange-600 mb-8">{{ winner.name }}</div>
            <button @click="resetGame" class="w-full bg-green-500 text-white text-xl font-bold py-4 rounded-xl">再玩一次</button>
        </div>
    </div>

    <div v-if="showTargetPicker" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-6">
        <div class="bg-white p-6 rounded-2xl w-full max-w-xs text-center">
            <h3 class="font-bold mb-4">对谁使用「{{ lastPlayedSpecial }}」？</h3>
            <div class="flex flex-col gap-2">
                <button v-for="p in otherPlayers" @click="resolveSpecial(p)" class="p-3 bg-indigo-50 rounded-lg font-bold text-indigo-800">{{ p.name }}</button>
            </div>
        </div>
    </div>
</div>

<script>
const { createApp, ref, computed } = Vue;
createApp({
    setup() {
        const gameState = ref('setup');
        const playerCount = ref(4);
        const playerNames = ref(['阿杜', '小明', '美美', '乐乐', '大华', '小芳']);
        const players = ref([]);
        const turnIndex = ref(0);
        const deck = ref([]);
        const targetCards = ref([]);
        const feedback = ref('');
        const selectedHandIndex = ref(null);
        const selectedTargetIndex = ref(null);
        const showTargetPicker = ref(false);
        const lastPlayedSpecial = ref('');

        const wordLib = ["坚持不懈", "开卷有益", "以礼待人", "新颖", "戏剧", "工作坊", "尴尬", "维护", "友谊", "一帆风顺", "有效", "策略", "嘉宾", "辅导员", "赖床", "滋味", "催促", "哀求", "硬着头皮", "藤鞭", "抡", "挨打", "女佣", "雨篷", "泪痕", "早晨", "猛", "嗓子眼", "允许", "相貌", "讲究", "何必", "记账", "亏", "撇", "慢条斯理", "起航", "焦急"];
        const specialCards = ["万能", "小偷", "换手", "+2", "禁止"];
        const isSpecial = (c) => specialCards.includes(c);

        const startGame = () => {
            let s = wordLib.join('').split('');
            specialCards.forEach(x => s.push(x, x));
            s.sort(() => Math.random() - 0.5);
            deck.value = s;
            players.value = [];
            for (let i = 0; i < playerCount.value; i++) {
                players.value.push({ name: playerNames.value[i] || `玩家${i+1}`, hand: deck.value.splice(0, 6), isSkipped: false });
            }
            targetCards.value = deck.value.splice(0, 3);
            gameState.value = 'playing';
            turnIndex.value = 0;
        };

        const currentPlayer = computed(() => players.value[turnIndex.value]);
        const otherPlayers = computed(() => players.value.filter(p => p !== currentPlayer.value));

        const selectHand = (idx) => {
            const card = currentPlayer.value.hand[idx];
            if (isSpecial(card)) {
                lastPlayedSpecial.value = card;
                selectedHandIndex.value = idx;
                if (card === "万能") feedback.value = "点击目标牌配对";
                else showTargetPicker.value = true;
                return;
            }
            selectedHandIndex.value = idx;
            check();
        };

        const selectTarget = (idx) => { selectedTargetIndex.value = idx; check(); };

        const check = () => {
            if (selectedHandIndex.value !== null && selectedTargetIndex.value !== null) {
                const c1 = currentPlayer.value.hand[selectedHandIndex.value];
                const c2 = targetCards.value[selectedTargetIndex.value];
                const ok = (c1 === "万能") || wordLib.some(w => w.includes(c1) && w.includes(c2) && c1 !== c2);
                if (ok) {
                    currentPlayer.value.hand.splice(selectedHandIndex.value, 1);
                    if (deck.value.length > 0) targetCards.value[selectedTargetIndex.value] = deck.value.shift();
                    else targetCards.value.splice(selectedTargetIndex.value, 1);
                    if (currentPlayer.value.hand.length === 0) { gameState.value = 'ended'; confetti(); }
                    else next();
                } else { feedback.value = "无法配对"; selectedHandIndex.value = null; selectedTargetIndex.value = null; }
            }
        };

        const resolveSpecial = (target) => {
            const type = lastPlayedSpecial.value;
            const idx = selectedHandIndex.value;
            if (type === "禁止") target.isSkipped = true;
            else if (type === "+2") target.hand.push(...deck.value.splice(0, 2));
            else if (type === "换手") { let t = [...currentPlayer.value.hand]; t.splice(idx,1); currentPlayer.value.hand = [...target.hand]; target.hand = t; }
            else if (type === "小偷" && target.hand.length > 0) currentPlayer.value.hand.push(target.hand.splice(0, 1)[0]);
            if (type !== "换手") currentPlayer.value.hand.splice(idx, 1);
            showTargetPicker.value = false;
            next();
        };

        const next = () => {
            selectedHandIndex.value = null; selectedTargetIndex.value = null; feedback.value = "";
            turnIndex.value = (turnIndex.value + 1) % players.value.length;
            if (players.value[turnIndex.value].isSkipped) { players.value[turnIndex.value].isSkipped = false; next(); }
        };

        const drawCard = () => {
            if (deck.value.length > 0) { currentPlayer.value.hand.push(deck.value.shift()); next(); }
            else gameState.value = 'ended';
        };

        const resetGame = () => gameState.value = 'setup';
        const winner = computed(() => [...players.value].sort((a,b) => a.hand.length - b.hand.length)[0]);

        return { gameState, playerCount, playerNames, players, currentPlayer, targetCards, deck, feedback, selectedHandIndex, selectedTargetIndex, showTargetPicker, lastPlayedSpecial, otherPlayers, startGame, selectHand, selectTarget, drawCard, winner, resetGame, resolveSpecial, isSpecial };
    }
}).mount('#app');
</script>
</body>
</html>
